# Sisyphus CI — 多平台编译 + 测试 + 代码检查
# 在 push 和 PR 时自动触发
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 主质量流水线（Linux）：格式 + vet + 测试 + 构建 + 冒烟 ─────────────
  quality:
    name: 质量检查（Linux）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: gofmt 格式检查
        run: |
          fmt=$(gofmt -s -l .)
          if [ -n "$fmt" ]; then
            echo "以下文件格式不正确:"
            echo "$fmt"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: 单元测试（race）
        run: go test -race -count=1 -v ./...

      - name: 编译
        run: |
          go build -v ./...
          go build -o bin/sisyphus ./cmd/sisyphus

      - name: 冒烟测试
        run: |
          chmod +x bin/sisyphus
          ./bin/sisyphus --help 2>&1 || true
          unset SISYPHUS_CONFIG
          timeout 3 ./bin/sisyphus 2>&1 || true
          echo "冒烟测试通过"

  # ── 轻量跨平台编译：只验证平台可编译，避免重复完整测试 ─────────────────
  cross-build:
    name: 跨平台编译 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        go: ["1.24"]
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 编译
        run: go build -v ./...

      - name: 编译二进制
        run: go build -o bin/sisyphus${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/sisyphus
