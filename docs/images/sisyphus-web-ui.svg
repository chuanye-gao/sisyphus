  <text x="663" y="143" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">你好，先介绍一下你自己?</text>
  <circle cx="605" cy="217" r="21" fill="#fffaf0" stroke="#ded7ca"/>
  <circle cx="605" cy="217" r="15" fill="#e7d4b5"/>
  <path d="M595 223C601 207 618 203 621 216C614 215 609 221 606 229C602 227 599 225 595 223Z" fill="#26384a"/>
  <text x="642" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Sisyphus</text>
  <text x="642" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">你好！我是 <tspan font-weight="700">Sisyphus</tspan>，一个专为日常程序员工作设计的小型 CLI 编码助手。</text>
  <text x="642" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">我的工作方式很简单：</text>
  <text x="642" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- <tspan font-weight="700">先检查，再编辑</tspan> -- 我会先阅读代码、搜索符号、理解项目结构，然后才做修改。</text>
  <text x="642" y="402" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- <tspan font-weight="700">小步修改</tspan> -- 我偏好精准的局部编辑，而不是大范围重写。</text>
  <text x="642" y="433" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- <tspan font-weight="700">每次修改后验证</tspan> -- 用最小的命令确认改动有效。</text>
  <text x="642" y="464" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- <tspan font-weight="700">遇到问题就调整</tspan> -- 读取错误信息，调整策略，再试一次。</text>
  <text x="642" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">我擅长的任务包括：</text>
  <text x="642" y="558" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- 探索代码库：梳理项目结构，找到相关文件和符号</text>
  <text x="642" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- 修复 bug：复现问题，定位原因，精准修复</text>
  <text x="642" y="618" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#111827">- 排查测试失败：分析失败输出，找到代码与测试的关联</text>
  <text x="642" y="681" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">目前我在 <tspan font-weight="700">Windows</tspan> 环境下运行。有什么我可以帮你的？</text>
